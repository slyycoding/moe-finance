<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d18;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e05d38;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c94822;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#e05d38;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#e05d38;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Accent bar left -->
  <rect x="0" y="0" width="5" height="630" fill="url(#accent)"/>

  <!-- Logo "Moe" -->
  <text x="80" y="310"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="160"
    font-weight="300"
    fill="none"
    stroke="white"
    stroke-width="1.5"
    letter-spacing="-4"
  >Moe</text>

  <!-- Separator -->
  <line x1="490" y1="185" x2="490" y2="335" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- FINANCIAL label -->
  <text x="515" y="290"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="300"
    fill="rgba(255,255,255,0.65)"
    letter-spacing="10"
  >FINANCIAL</text>

  <!-- Tagline -->
  <text x="80" y="410"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="300"
    fill="rgba(255,255,255,0.45)"
    letter-spacing="1"
  >Melbourne Finance Broker · 500+ Clients Helped</text>

  <!-- Orange accent pill -->
  <rect x="80" y="450" width="220" height="3" rx="2" fill="url(#accent)"/>

  <!-- Stats row -->
  <text x="80" y="530" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="white">500+</text>
  <text x="80" y="558" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="2">CLIENTS</text>

  <text x="280" y="530" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="white">65+</text>
  <text x="280" y="558" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="2">LENDERS</text>

  <text x="460" y="530" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="white">4+</text>
  <text x="460" y="558" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="2">YEARS</text>

  <!-- Domain -->
  <text x="1120" y="600" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.25)" text-anchor="end">moefinancial.com.au</text>
</svg>
